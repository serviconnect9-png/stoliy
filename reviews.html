<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6C3CF0">
    <title>Reviews - Stoliy</title>
    <link rel="icon" type="image/png" href="app-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #F7F7F9; --card: #FFFFFF; --text: #1A1A2E; --text2: #6B7280; --accent: #6C3CF0; --success: #2ECC71; --warning: #F4B400; --border: #E5E7EB; --radius: 14px; --font: 'Inter', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }
        .page-header { padding: 16px; display: flex; align-items: center; gap: 12px; background: #fff; border-bottom: 1px solid var(--border); }
        .btn-back { width: 36px; height: 36px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .page-title { font-size: 18px; font-weight: 700; flex: 1; }
        .review-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 12px 16px; }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .review-name { font-weight: 600; font-size: 14px; }
        .review-date { font-size: 11px; color: var(--text2); }
        .review-stars { color: var(--warning); font-size: 12px; margin-bottom: 6px; }
        .review-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
        .reply-btn { color: var(--accent); font-size: 12px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="page-header"><button class="btn-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button><h2 class="page-title">Reviews</h2></div>
        <div id="reviewsList"><div style="text-align:center;padding:40px;">Loading reviews...</div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <script>
    try { if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebaseConfig); } catch(e) {}
    const auth = firebase.auth(), db = firebase.firestore();
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        const allStores = await db.collection('stores').get();
        const myStore = allStores.docs.find(d => d.data().ownerId === user.uid);
        if (!myStore) { window.location.href = 'wizard.html'; return; }
        const allReviews = await db.collection('reviews').get();
        const myReviews = allReviews.docs.map(d => ({ id: d.id, ...d.data() })).filter(r => r.storeId === myStore.id);
        const container = document.getElementById('reviewsList');
        container.innerHTML = myReviews.length === 0 ? 
            '<div style="text-align:center;padding:40px;color:var(--text2);">No reviews yet</div>' :
            myReviews.map(r => `
                <div class="review-card">
                    <div class="review-header"><span class="review-name">${r.userName||'Customer'}</span><span class="review-date">${r.createdAt?.toDate?.()?r.createdAt.toDate().toLocaleDateString():''}</span></div>
                    <div class="review-stars">${'★'.repeat(r.rating||5)}${'☆'.repeat(5-(r.rating||5))}</div>
                    <p class="review-text">${r.comment||'No comment'}</p>
                    <span class="reply-btn" onclick="replyToReview('${r.id}')">Reply</span>
                </div>
            `).join('');
    });

    function replyToReview(id) {
        const reply = prompt('Enter your reply:');
        if (reply) db.collection('reviews').doc(id).update({ sellerReply: reply }).then(() => location.reload());
    }
    window.replyToReview = replyToReview;
    </script>
</body>
</html>
