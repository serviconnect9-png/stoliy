<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6C3CF0">
    
    <!-- Dynamic Meta Tags for Social Sharing -->
    <meta property="og:title" content="Store - Stoliy" id="ogTitle">
    <meta property="og:description" content="Check out this store on Stoliy" id="ogDesc">
    <meta property="og:image" content="app-icon.png" id="ogImage">
    <meta property="og:url" content="" id="ogUrl">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Store - Stoliy" id="twTitle">
    <meta name="twitter:description" content="Check out this store on Stoliy" id="twDesc">
    <meta name="twitter:image" content="app-icon.png" id="twImage">
    
    <title id="pageTitle">Store - Stoliy</title>
    <link rel="icon" type="image/png" href="app-icon.png">
    <link rel="apple-touch-icon" href="app-icon.png">
    <link rel="canonical" href="" id="canonicalUrl">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #F7F7F9; --card: #FFFFFF; --text: #1A1A2E; --text2: #6B7280; --text3: #9CA3AF; --accent: #6C3CF0; --success: #2ECC71; --error: #FF4D4F; --warning: #F4B400; --border: #E5E7EB; --radius: 14px; --font: 'Inter', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
        
        .top-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #fff; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
        .btn-back { width: 34px; height: 34px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text); }
        .top-bar-title { font-weight: 600; font-size: 14px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .store-banner { width: 100%; height: 150px; object-fit: cover; display: block; background: linear-gradient(135deg, #6C3CF0, #4A1FB8); }
        .store-info { padding: 0 16px; margin-top: -35px; position: relative; z-index: 2; display: flex; align-items: flex-end; gap: 12px; }
        .store-logo { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex-shrink: 0; }
        .store-info-text { flex: 1; padding-bottom: 6px; min-width: 0; }
        .store-name { font-size: 20px; font-weight: 800; }
        .store-category { font-size: 11px; color: var(--accent); margin-top: 2px; }
        
        .action-row { display: flex; gap: 8px; padding: 12px 16px; }
        .btn-action { flex: 1; padding: 10px 12px; border-radius: 25px; font-weight: 600; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--text); display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-follow { border-color: var(--accent); color: var(--accent); }
        .btn-follow.following { background: var(--accent); color: #fff; }
        
        .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; padding: 0 16px; margin-bottom: 14px; }
        .stat-box { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 12px 6px; text-align: center; cursor: pointer; }
        .stat-num { font-size: 16px; font-weight: 700; }
        .stat-lbl { font-size: 9px; color: var(--text2); text-transform: uppercase; margin-top: 2px; }
        
        .tabs { display: flex; padding: 0 16px; border-bottom: 1px solid var(--border); gap: 2px; overflow-x: auto; scrollbar-width: none; }
        .tab { padding: 10px 16px; border: none; background: none; font-weight: 600; font-size: 12px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; white-space: nowrap; font-family: var(--font); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { padding: 16px; min-height: 200px; }
        
        .products-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
        .product-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; position: relative; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; background: #F3F4F6; }
        .product-card .card-body { padding: 10px 12px; }
        .product-card .card-name { font-weight: 600; font-size: 12px; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-card .card-price { font-weight: 700; font-size: 15px; color: var(--success); }
        .discount-badge { position: absolute; top: 6px; left: 6px; background: var(--error); color: #fff; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; }
        .flash-badge { position: absolute; top: 6px; right: 6px; background: var(--warning); color: #1A1A2E; padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        
        .promo-card { background: linear-gradient(135deg, #FF4D4F, #C62828); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; color: #fff; cursor: pointer; }
        .promo-card.purple { background: linear-gradient(135deg, #6C3CF0, #4A1FB8); }
        .about-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
        .about-card h4 { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F3F4F6; font-size: 12px; }
        .social-links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
        .social-link { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; cursor: pointer; transition: transform 0.2s; }
        .social-link:hover { transform: scale(1.1); }
        .social-link.instagram { background: linear-gradient(135deg, #833AB4, #FD1D1D, #F77737); }
        .social-link.facebook { background: #1877F2; }
        .social-link.x { background: #000; }
        .social-link.tiktok { background: #000; }
        .social-link.youtube { background: #FF0000; }
        .social-link.whatsapp { background: #25D366; }
        .social-link.telegram { background: #0088cc; }
        .social-link.website { background: var(--accent); }
        
        .review-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1A1A2E; color: #fff; padding: 12px 20px; border-radius: 25px; font-size: 13px; font-weight: 600; z-index: 9999; transition: transform 0.3s ease; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 6px 0 22px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: var(--text3); border: none; background: none; font-family: var(--font); padding: 5px 10px; }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app-container" id="appRoot"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>

    <script>
    (function() {
        // Built-in clean URL handler
        (function() {
            var path = window.location.pathname;
            if (path.startsWith('/store/') && !path.includes('.html')) {
                var slug = path.split('/store/')[1].replace(/\/$/, '').trim();
                if (slug) { window.location.replace('store.html?slug=' + encodeURIComponent(slug)); return; }
            }
        })();

        try { if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebaseConfig); } catch(e) {}
        const auth = firebase.auth(), db = firebase.firestore();
        const params = new URLSearchParams(window.location.search);
        let storeId = params.get('id');
        const storeSlug = params.get('slug');
        let currentUser, userData, storeData, products=[], reviews=[], events=[], followersList=[], isFollowing=false, currentTab='products', storeUrl='', flashSales=[], discountCodes=[];
        const BASE_URL = (typeof CONFIG !== 'undefined' && CONFIG.baseUrl) ? CONFIG.baseUrl : window.location.origin;

        function showToast(msg, type) {
            const t = document.querySelector('.toast'); if(t) t.remove();
            const toast = document.createElement('div'); toast.className = 'toast ' + (type || ''); toast.textContent = msg;
            document.body.appendChild(toast); setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2000);
        }

        async function resolveStoreId() {
            if (storeId) return true;
            if (!storeSlug) return false;
            const allStores = await db.collection('stores').get();
            const found = allStores.docs.find(d => {
                const s = d.data();
                const storedSlug = s.slug || '';
                const generatedSlug = (s.name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                return storedSlug === storeSlug || generatedSlug === storeSlug;
            });
            if (found) { storeId = found.id; return true; }
            return false;
        }

        function updateMetaTags() {
            if (!storeData) return;
            const title = storeData.name || 'Store';
            const desc = storeData.description || 'Check out this store on Stoliy';
            const image = storeData.logo || storeData.banner || 'app-icon.png';
            const url = storeUrl || window.location.href;
            
            document.title = title + ' - Stoliy';
            document.getElementById('pageTitle').textContent = title + ' - Stoliy';
            document.getElementById('ogTitle').setAttribute('content', title);
            document.getElementById('ogDesc').setAttribute('content', desc.substring(0, 200));
            document.getElementById('ogImage').setAttribute('content', image);
            document.getElementById('ogUrl').setAttribute('content', url);
            document.getElementById('twTitle').setAttribute('content', title);
            document.getElementById('twDesc').setAttribute('content', desc.substring(0, 200));
            document.getElementById('twImage').setAttribute('content', image);
            document.getElementById('canonicalUrl').setAttribute('href', url);
        }

        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) { try { const uDoc = await db.collection('users').doc(user.uid).get(); userData = uDoc.exists ? uDoc.data() : {}; } catch(e) {} }
            const resolved = await resolveStoreId();
            if (!resolved) { document.getElementById('appRoot').innerHTML = '<div class="empty-state" style="padding:80px;"><i class="fas fa-store-slash" style="font-size:48px;opacity:0.3;"></i><h3>Store Not Found</h3></div>'; return; }
            
            const cacheKey = 'store_' + storeId;
            const cached = sessionStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const d = JSON.parse(cached);
                    if (Date.now() - d.timestamp < 30000) {
                        storeData = d.storeData; products = d.products; reviews = d.reviews;
                        events = d.events; followersList = d.followersList;
                        flashSales = d.flashSales; discountCodes = d.discountCodes;
                        isFollowing = userData ? (userData.following || []).includes(storeId) : false;
                        storeUrl = `${BASE_URL}/store/${storeData.slug || (storeData.name||'store').toLowerCase().replace(/[^a-z0-9]+/g,'-')}`;
                        updateMetaTags();
                        renderStore();
                        refreshInBackground();
                        return;
                    }
                } catch(e) { sessionStorage.removeItem(cacheKey); }
            }
            await loadFresh();
        });

        async function loadFresh() {
            const storeDoc = await db.collection('stores').doc(storeId).get();
            if (!storeDoc.exists) { document.getElementById('appRoot').innerHTML = '<div class="empty-state" style="padding:80px;"><h3>Store not found</h3></div>'; return; }
            storeData = { id: storeDoc.id, ...storeDoc.data() };
            isFollowing = userData ? (userData.following || []).includes(storeId) : false;
            const slug = storeData.slug || (storeData.name || 'store').toLowerCase().replace(/[^a-z0-9]+/g, '-');
            storeUrl = `${BASE_URL}/store/${slug}`;
            updateMetaTags();
            renderStoreShell();
            
            const [prodSnap, revSnap, usersSnap, eventsSnap, flashSnap, discSnap] = await Promise.all([
                db.collection('products').get(), db.collection('reviews').get(), db.collection('users').get(),
                db.collection('events').get(), db.collection('flashSales').get(), db.collection('discountCodes').get()
            ]);
            products = prodSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.storeId === storeId && p.active !== false);
            reviews = revSnap.docs.map(d => d.data()).filter(r => r.storeId === storeId);
            followersList = usersSnap.docs.map(d => d.data()).filter(u => (u.following || []).includes(storeId));
            events = eventsSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(e => e.storeId === storeId && e.status === 'published');
            flashSales = flashSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(f => f.storeId === storeId && f.active);
            discountCodes = discSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d.storeId === storeId && d.active);
            
            try { sessionStorage.setItem('store_' + storeId, JSON.stringify({ storeData, products, reviews, events, followersList, flashSales, discountCodes, timestamp: Date.now() })); } catch(e) {}
            renderStore();
        }

        async function refreshInBackground() {
            try {
                const [prodSnap, flashSnap, discSnap] = await Promise.all([db.collection('products').get(), db.collection('flashSales').get(), db.collection('discountCodes').get()]);
                products = prodSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.storeId === storeId && p.active !== false);
                flashSales = flashSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(f => f.storeId === storeId && f.active);
                discountCodes = discSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d.storeId === storeId && d.active);
                try { sessionStorage.setItem('store_' + storeId, JSON.stringify({ storeData, products, reviews, events, followersList, flashSales, discountCodes, timestamp: Date.now() })); } catch(e) {}
            } catch(e) {}
        }

        function renderStoreShell() {
            const s = storeData;
            document.getElementById('appRoot').innerHTML = `
                <div class="top-bar"><button class="btn-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button><span class="top-bar-title">${s.name||'Store'}</span><button class="btn-back" onclick="openShareModal()"><i class="fas fa-share-alt"></i></button></div>
                ${s.banner?`<img src="${s.banner}" class="store-banner">`:'<div class="store-banner"></div>'}
                <div class="store-info"><img src="${s.logo||'https://via.placeholder.com/70'}" class="store-logo" onerror="this.src=\'https://via.placeholder.com/70\'"><div class="store-info-text"><div class="store-name">${s.name||'Store'} ${s.verified?'<i class="fas fa-check-circle" style="color:var(--accent);font-size:14px;"></i>':''}</div><div class="store-category"><i class="fas fa-tag"></i> ${s.category||'General Store'}</div></div></div>
                <div class="action-row">
                    <button class="btn-action btn-follow ${isFollowing?'following':''}" onclick="toggleFollow()" id="followBtn"><i class="fas ${isFollowing?'fa-user-check':'fa-user-plus'}"></i> ${isFollowing?'Following':'Follow'}</button>
                    <button class="btn-action" onclick="openChatWithOwner()"><i class="fas fa-comment-dots"></i> Chat</button>
                    <button class="btn-action" onclick="openShareModal()"><i class="fas fa-share-alt"></i> Share</button>
                </div>
                <div style="text-align:center;padding:30px;color:var(--text3);">Loading products...</div>`;
        }

        function renderStore() {
            const s = storeData;
            const fc = followersList.length;
            const sr = (s.rating||0).toFixed(1);
            const hasPromo = flashSales.length > 0 || discountCodes.length > 0;
            const fpIds = flashSales.map(f => f.productId);
            products.forEach(p => { p.isFlashSale = fpIds.includes(p.id); p.flashData = flashSales.find(f => f.productId === p.id); });

            document.getElementById('appRoot').innerHTML = `
                <div class="top-bar"><button class="btn-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button><span class="top-bar-title">${s.name||'Store'}</span><button class="btn-back" onclick="openShareModal()"><i class="fas fa-share-alt"></i></button></div>
                ${s.banner?`<img src="${s.banner}" class="store-banner">`:'<div class="store-banner"></div>'}
                <div class="store-info"><img src="${s.logo||'https://via.placeholder.com/70'}" class="store-logo" onerror="this.src=\'https://via.placeholder.com/70\'"><div class="store-info-text"><div class="store-name">${s.name||'Store'} ${s.verified?'<i class="fas fa-check-circle" style="color:var(--accent);font-size:14px;"></i>':''}</div><div class="store-category"><i class="fas fa-tag"></i> ${s.category||'General Store'}</div></div></div>
                <div class="action-row">
                    <button class="btn-action btn-follow ${isFollowing?'following':''}" onclick="toggleFollow()" id="followBtn"><i class="fas ${isFollowing?'fa-user-check':'fa-user-plus'}"></i> ${isFollowing?'Following':'Follow'}</button>
                    <button class="btn-action" onclick="openChatWithOwner()"><i class="fas fa-comment-dots"></i> Chat</button>
                    <button class="btn-action" onclick="openShareModal()"><i class="fas fa-share-alt"></i> Share</button>
                </div>
                <div class="stats-row">
                    <div class="stat-box" onclick="showFollowers()"><div class="stat-num">${fc}</div><div class="stat-lbl">Followers</div></div>
                    <div class="stat-box"><div class="stat-num">${sr} <i class="fas fa-star" style="color:#F4B400;font-size:10px;"></i></div><div class="stat-lbl">Rating</div></div>
                    <div class="stat-box"><div class="stat-num">${reviews.length}</div><div class="stat-lbl">Reviews</div></div>
                    <div class="stat-box"><div class="stat-num">${products.length}</div><div class="stat-lbl">Products</div></div>
                </div>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('products', this)"><i class="fas fa-box"></i> Products</button>
                    ${hasPromo?'<button class="tab" onclick="switchTab(\'promo\', this)"><i class="fas fa-tags"></i> Promo</button>':''}
                    ${events.length>0?'<button class="tab" onclick="switchTab(\'tickets\', this)"><i class="fas fa-ticket-alt"></i> Tickets</button>':''}
                    <button class="tab" onclick="switchTab('reviews', this)"><i class="fas fa-star"></i> Reviews</button>
                    <button class="tab" onclick="switchTab('about', this)"><i class="fas fa-info-circle"></i> About</button>
                </div>
                <div class="tab-content" id="tabContent">${renderProducts()}</div>`;
        }

        function renderProducts() {
            if (!products.length) return '<div class="empty-state"><i class="fas fa-box-open"></i><p>No products yet</p></div>';
            return `<div class="products-grid">${products.map(p => {
                const price = p.isFlashSale&&p.flashData?(p.flashData.salePrice||p.price):(p.price||0);
                const orig = p.originalPrice||p.price||0;
                const disc = orig>price?Math.round((1-price/orig)*100):0;
                return `<div class="product-card" onclick="window.location.href='products.html?id=${p.id}'"><img src="${(p.images&&p.images[0])||'https://via.placeholder.com/200'}" onerror="this.src='https://via.placeholder.com/200'" loading="lazy">${disc>0?`<span class="discount-badge">-${disc}%</span>`:''}${p.isFlashSale?'<span class="flash-badge">⚡ FLASH</span>':''}<div class="card-body"><div class="card-name">${p.name||'Product'}</div><span class="card-price">$${price.toFixed(2)}</span>${disc>0?`<span style="font-size:11px;color:var(--text3);text-decoration:line-through;margin-left:4px;">$${orig.toFixed(2)}</span>`:''}</div></div>`;
            }).join('')}</div>`;
        }

        function renderPromo() {
            let h = '';
            flashSales.forEach(f => { var p = products.find(x => x.id === f.productId); h += `<div class="promo-card" onclick="window.location.href='products.html?id=${f.productId}'"><div style="font-weight:800;font-size:16px;">⚡ Flash Sale${p?': '+p.name:''}</div><div style="font-size:28px;font-weight:800;">$${f.salePrice||0}</div><div style="font-size:12px;">Was $${p?.price||0}</div></div>`; });
            discountCodes.forEach(d => { h += `<div class="promo-card purple"><div style="font-weight:800;font-size:16px;">🎫 ${d.code}</div><div style="font-size:14px;margin-top:4px;">${d.type==='percentage'?d.value+'% OFF':'$'+d.value+' OFF'}</div></div>`; });
            return h || '<div class="empty-state"><i class="fas fa-tags"></i><p>No promotions</p></div>';
        }

        function renderTickets() {
            if (!events.length) return '<div class="empty-state"><i class="fas fa-ticket-alt"></i><p>No events</p></div>';
            return events.map(e => { const sd = new Date(e.startDate); const mp = e.ticketTypes&&e.ticketTypes.length?Math.min(...e.ticketTypes.map(t=>t.price||0)):0; return `<div onclick="window.location.href='event-detail.html?id=${e.id}'" style="background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;cursor:pointer;">${e.banner?`<img src="${e.banner}" style="width:100%;height:100px;object-fit:cover;">`:'<div style="width:100%;height:100px;background:linear-gradient(135deg,#6C3CF0,#4A1FB8);"></div>'}<div style="padding:14px;"><div style="font-weight:700;">${e.name||'Event'}</div><div style="font-size:11px;color:var(--text2);">${sd.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} • ${e.venue||'Online'}</div><div style="font-weight:800;color:var(--accent);margin-top:6px;">${mp===0?'FREE':'From $'+mp.toFixed(2)}</div></div></div>`; }).join('');
        }

        function renderReviews() {
            if (!reviews.length) return '<div class="empty-state"><i class="fas fa-star-half-alt"></i><p>No reviews</p></div>';
            return reviews.map(r => `<div class="review-card"><div style="display:flex;justify-content:space-between;"><span style="font-weight:600;">${r.userName||'Customer'}</span><span style="font-size:10px;color:var(--text3);">${r.createdAt?.toDate?r.createdAt.toDate().toLocaleDateString():''}</span></div><div style="color:var(--warning);">${'★'.repeat(r.rating||5)}</div><p style="font-size:12px;color:var(--text2);">${r.comment||''}</p></div>`).join('');
        }

        function renderAbout() {
            const s = storeData;
            const socials = [];
            if (s.instagram) socials.push({ icon: 'fab fa-instagram', link: s.instagram, class: 'instagram' });
            if (s.facebook) socials.push({ icon: 'fab fa-facebook-f', link: s.facebook, class: 'facebook' });
            if (s.twitter||s.x) socials.push({ icon: 'fab fa-x-twitter', link: s.twitter||s.x, class: 'x' });
            if (s.tiktok) socials.push({ icon: 'fab fa-tiktok', link: s.tiktok, class: 'tiktok' });
            if (s.youtube) socials.push({ icon: 'fab fa-youtube', link: s.youtube, class: 'youtube' });
            if (s.whatsapp) socials.push({ icon: 'fab fa-whatsapp', link: s.whatsapp, class: 'whatsapp' });
            if (s.telegram) socials.push({ icon: 'fab fa-telegram-plane', link: s.telegram, class: 'telegram' });
            if (s.website) socials.push({ icon: 'fas fa-globe', link: s.website, class: 'website' });
            return `<div class="about-card"><h4><i class="fas fa-store"></i> About ${s.name||'Store'}</h4><p style="font-size:13px;color:var(--text2);">${s.description||'No description yet.'}</p></div>
                <div class="about-card"><h4><i class="fas fa-truck"></i> Shipping</h4><div class="info-row"><span>Shipping Time</span><span>${s.shippingDuration||'3-7 days'}</span></div><div class="info-row"><span>Returns</span><span>${s.returnPolicy||'14 days'}</span></div><div class="info-row"><span>Country</span><span>${s.country||'N/A'}</span></div></div>
                ${socials.length?`<div class="about-card"><h4><i class="fas fa-share-alt"></i> Follow Us</h4><div class="social-links">${socials.map(sc=>`<a href="${sc.link}" target="_blank" rel="noopener" class="social-link ${sc.class}" title="${sc.name||''}"><i class="${sc.icon}"></i></a>`).join('')}</div></div>`:''}
                <div class="about-card"><h4><i class="fas fa-info-circle"></i> Details</h4><div class="info-row"><span>Category</span><span>${s.category||'N/A'}</span></div><div class="info-row"><span>Joined</span><span>${s.createdAt?.toDate?s.createdAt.toDate().toLocaleDateString():'Recently'}</span></div><div class="info-row"><span>Status</span><span>${s.verified?'✅ Verified':'⏳ Pending'}</span></div></div>`;
        }

        window.switchTab = function(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (btn) btn.classList.add('active');
            const c = document.getElementById('tabContent');
            c.innerHTML = tab==='products'?renderProducts():tab==='promo'?renderPromo():tab==='tickets'?renderTickets():tab==='reviews'?renderReviews():renderAbout();
        };

        window.openChatWithOwner = function() {
            if (!currentUser) { window.location.href = 'login.html'; return; }
            if (!storeData.ownerId) { showToast('Store owner not available'); return; }
            if (storeData.ownerId === currentUser.uid) { showToast('This is your own store!'); return; }
            window.location.href = `chat-detail.html?store=${storeId}`;
        };

        async function toggleFollow() {
            if (!currentUser) { window.location.href = 'login.html'; return; }
            const btn = document.getElementById('followBtn');
            if (isFollowing) {
                await db.collection('users').doc(currentUser.uid).update({ following: firebase.firestore.FieldValue.arrayRemove(storeId) });
                await db.collection('stores').doc(storeId).update({ followers: firebase.firestore.FieldValue.increment(-1) });
                isFollowing = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Follow'; btn.classList.remove('following');
            } else {
                await db.collection('users').doc(currentUser.uid).update({ following: firebase.firestore.FieldValue.arrayUnion(storeId) });
                await db.collection('stores').doc(storeId).update({ followers: firebase.firestore.FieldValue.increment(1) });
                isFollowing = true; btn.innerHTML = '<i class="fas fa-user-check"></i> Following'; btn.classList.add('following');
                if (storeData.ownerId && storeData.ownerId !== currentUser.uid) {
                    await db.collection('notifications').add({ userId: storeData.ownerId, type: 'store_follow', message: (userData?.name||'Someone') + ' started following your store!', link: 'followers.html', read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                }
            }
            if (userData) { if (!userData.following) userData.following = []; if (isFollowing) userData.following.push(storeId); else userData.following = userData.following.filter(f => f !== storeId); }
        }

        function showFollowers() {
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:flex-end;justify-content:center;';
            modal.innerHTML = `<div style="background:#fff;width:100%;max-width:500px;border-radius:20px 20px 0 0;max-height:70vh;overflow-y:auto;padding:20px 16px 40px;"><div style="display:flex;justify-content:space-between;margin-bottom:16px;"><h3>Followers (${followersList.length})</h3><button style="background:none;border:none;font-size:22px;" onclick="this.closest('[style*=fixed]').remove()">&times;</button></div>${followersList.length===0?'<div style="text-align:center;padding:30px;">No followers yet</div>':followersList.map(f=>`<div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #eee;"><img src="${f.photoURL||'https://via.placeholder.com/40'}" style="width:40px;height:40px;border-radius:50%;"><span style="font-weight:600;">${f.name||'User'}</span></div>`).join('')}</div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
        }

        function openShareModal() {
            const title = storeData.name || 'Check out this store on Stoliy';
            const url = storeUrl;
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:flex-end;justify-content:center;';
            const platforms = [
                { name: 'WhatsApp', icon: 'fab fa-whatsapp', color: '#25D366', action: () => window.open(`https://wa.me/?text=${encodeURIComponent(title+': '+url)}`, '_blank') },
                { name: 'Facebook', icon: 'fab fa-facebook-f', color: '#1877F2', action: () => window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank') },
                { name: 'X', icon: 'fab fa-x-twitter', color: '#000', action: () => window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`, '_blank') },
                { name: 'Telegram', icon: 'fab fa-telegram-plane', color: '#0088cc', action: () => window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`, '_blank') },
                { name: 'Messenger', icon: 'fab fa-facebook-messenger', color: '#00B2FF', action: () => window.open(`https://www.facebook.com/dialog/send?link=${encodeURIComponent(url)}&app_id=0`, '_blank') },
                { name: 'Email', icon: 'fas fa-envelope', color: '#EA4335', action: () => window.open(`mailto:?subject=${encodeURIComponent(title)}&body=${encodeURIComponent(url)}`, '_blank') },
                { name: 'Instagram', icon: 'fab fa-instagram', color: 'linear-gradient(135deg,#833AB4,#FD1D1D,#F77737)', action: () => { navigator.clipboard.writeText(url); showToast('Link copied! Share on Instagram', 'success'); } },
                { name: 'Copy Link', icon: 'fas fa-link', color: 'var(--accent)', action: () => { navigator.clipboard.writeText(url); showToast('Link copied!', 'success'); } }
            ];
            modal.innerHTML = `<div style="background:#fff;width:100%;max-width:500px;border-radius:20px 20px 0 0;padding:20px 16px 40px;"><div style="display:flex;justify-content:space-between;margin-bottom:16px;"><h3>Share Store</h3><button style="background:none;border:none;font-size:22px;" onclick="this.closest('[style*=fixed]').remove()">&times;</button></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">${platforms.map(p=>`<div onclick="document.querySelector('[style*=fixed]').remove();(${p.action.toString()})()" style="text-align:center;cursor:pointer;"><div style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;margin:0 auto 4px;background:${p.color};"><i class="${p.icon}"></i></div><span style="font-size:10px;color:#666;">${p.name}</span></div>`).join('')}</div></div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
        }

        window.toggleFollow = toggleFollow;
        window.showFollowers = showFollowers;
        window.openShareModal = openShareModal;
        window.openChatWithOwner = openChatWithOwner;
    })();
    </script>
</body>
</html>
