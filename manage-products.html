<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6C3CF0">
    <title>Manage Products - Stoliy</title>
    <link rel="icon" type="image/png" href="app-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #F7F7F9; --card: #FFFFFF; --text: #1A1A2E; --text2: #6B7280; --accent: #6C3CF0; --success: #2ECC71; --error: #FF4D4F; --warning: #F4B400; --border: #E5E7EB; --radius: 14px; --font: 'Inter', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }
        .page-header { padding: 16px; display: flex; align-items: center; gap: 12px; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        .btn-back { width: 36px; height: 36px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .page-title { font-size: 18px; font-weight: 700; flex: 1; }
        .btn-add { background: var(--accent); color: #fff; border: none; padding: 10px 16px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; }
        .product-item { display: flex; gap: 12px; padding: 14px 16px; background: #fff; border-bottom: 1px solid #F3F4F6; align-items: center; }
        .product-item img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: #E5E7EB; flex-shrink: 0; }
        .product-info { flex: 1; min-width: 0; }
        .product-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
        .product-meta { font-size: 11px; color: var(--text2); }
        .product-price { font-weight: 700; color: var(--success); font-size: 13px; }
        .product-actions { display: flex; gap: 4px; }
        .btn-sm { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .btn-sm.danger { color: var(--error); }
        .status-badge { font-size: 9px; padding: 2px 8px; border-radius: 6px; font-weight: 700; }
        .status-active { background: rgba(46,204,113,0.1); color: var(--success); }
        .status-draft { background: rgba(244,180,0,0.1); color: var(--warning); }
        .empty-state { text-align: center; padding: 60px; color: var(--text2); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="page-header">
            <button class="btn-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
            <h2 class="page-title">Manage Products</h2>
            <button class="btn-add" onclick="window.location.href='add-product.html'"><i class="fas fa-plus"></i> Add</button>
        </div>
        <div id="productsList"><div style="text-align:center;padding:60px;">Loading products...</div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <script>
    try { if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebaseConfig); } catch(e) {}
    const auth = firebase.auth(), db = firebase.firestore();
    let currentUser = null, storeId = null;

    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        const allStores = await db.collection('stores').get();
        const myStore = allStores.docs.find(d => d.data().ownerId === user.uid);
        if (!myStore) { window.location.href = 'wizard.html'; return; }
        storeId = myStore.id;
        loadProducts();
    });

    async function loadProducts() {
        const allProducts = await db.collection('products').get();
        const myProducts = allProducts.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.storeId === storeId);
        const container = document.getElementById('productsList');
        
        if (myProducts.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open" style="font-size:40px;opacity:0.3;display:block;margin-bottom:12px;"></i><h3>No products yet</h3><p>Add your first product</p></div>';
            return;
        }

        container.innerHTML = myProducts.map(p => `
            <div class="product-item">
                <img src="${(p.images&&p.images[0])||'https://via.placeholder.com/60'}" onerror="this.src='https://via.placeholder.com/60'">
                <div class="product-info">
                    <div class="product-name">${p.name}</div>
                    <div class="product-meta">SKU: ${p.sku||'N/A'} • Stock: ${p.stockQuantity||0}</div>
                    <div class="product-price">$${(p.price||0).toFixed(2)} ${p.discountPrice?`<span style="text-decoration:line-through;color:var(--text2);font-size:11px;">$${p.discountPrice.toFixed(2)}</span>`:''}</div>
                    <span class="status-badge ${p.active!==false?'status-active':'status-draft'}">${p.active!==false?'Active':'Draft'}</span>
                </div>
                <div class="product-actions">
                    <button class="btn-sm" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn-sm danger" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }

    async function deleteProduct(id) {
        if (!confirm('Delete this product?')) return;
        await db.collection('products').doc(id).delete();
        await db.collection('stores').doc(storeId).update({ totalProducts: firebase.firestore.FieldValue.increment(-1) });
        loadProducts();
    }

    function editProduct(id) {
        window.location.href = `edit-product.html?id=${id}`;
    }

    window.deleteProduct = deleteProduct;
    window.editProduct = editProduct;
    </script>
</body>
</html>
