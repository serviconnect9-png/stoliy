<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B0B14">
    <title>Sign In - Stoliy</title>
    <link rel="icon" type="image/png" href="app-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="app-icon.png" alt="Stoliy" class="auth-logo-img" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fas fa-store-alt\' style=\'font-size:48px;color:#6C3CF0;\'></i>';">
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your account</p>

            <button id="google-login-btn" class="google-btn" type="button">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>

            <div class="auth-divider"><span>or sign in with email</span></div>

            <form id="login-form" class="auth-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="login-email">Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <div style="text-align: right;">
                    <a href="reset-password.html" style="color:#6C3CF0; text-decoration:none; font-size:13px; font-weight:500;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="login-submit-btn">Sign In</button>
            </form>

            <div id="alert-container" class="alert-container"></div>

            <div id="verify-banner" class="verify-notice" style="display:none;">
                <strong>📧 Email not verified?</strong> Check your inbox and spam folder. 
                <a href="#" id="resend-verification" style="color:#6C3CF0; font-weight:600;">Resend verification</a>
            </div>

            <p class="auth-footer">
                Don't have an account? <a href="register.html" class="auth-link">Create one</a>
            </p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Stoliy Core -->
    <script src="config.js"></script>
    <script src="utils.js"></script>

    <script>
    (function() {
        console.log('🔐 Stoliy Login - Initializing...');

        // Initialize Firebase
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(CONFIG.firebaseConfig);
            }
        } catch(e) {
            console.error('Firebase init error:', e);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // Check if already logged in
        auth.onAuthStateChanged(async (user) => {
            if (user && user.emailVerified) {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists && userDoc.data().onboardingCompleted) {
                    window.location.href = 'home.html';
                } else if (userDoc.exists) {
                    window.location.href = 'wizard.html';
                }
            }
        });

        // Check for registration success message
        const params = new URLSearchParams(window.location.search);
        if (params.get('registered') === '1') {
            showAlert('✅ Account created! Please sign in.', 'success');
        }
        if (params.get('verify') === '1') {
            document.getElementById('verify-banner').style.display = 'block';
        }

        // =====================
        // LOGIN FORM
        // =====================
        document.getElementById('login-form')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('login-submit-btn');
            const orig = btn.textContent;
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showAlert('Please fill in all fields', 'error');
                btn.textContent = orig;
                btn.disabled = false;
                return;
            }

            try {
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const user = userCred.user;

                if (!user.emailVerified) {
                    await auth.signOut();
                    showAlert('Please verify your email first. Check your inbox.', 'error');
                    document.getElementById('verify-banner').style.display = 'block';
                    btn.textContent = orig;
                    btn.disabled = false;
                    return;
                }

                // Get user data
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data() || {};

                // Store in session
                sessionStorage.setItem('userData', JSON.stringify(userData));
                sessionStorage.setItem('userId', userData.userId || '');

                showAlert('✅ Welcome back!', 'success');
                
                // Redirect based on onboarding
                setTimeout(() => {
                    if (userData.onboardingCompleted) {
                        window.location.href = 'home.html';
                    } else {
                        window.location.href = 'wizard.html';
                    }
                }, 800);

            } catch(error) {
                console.error('Login error:', error);
                let msg = 'Login failed';
                if (error.code === 'auth/user-not-found') msg = 'No account found with this email';
                if (error.code === 'auth/wrong-password') msg = 'Incorrect password';
                if (error.code === 'auth/invalid-email') msg = 'Invalid email address';
                if (error.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
                if (error.code === 'auth/user-disabled') msg = 'This account has been disabled.';
                showAlert(msg, 'error');
                btn.textContent = orig;
                btn.disabled = false;
            }
        });

        // =====================
        // GOOGLE LOGIN
        // =====================
        document.getElementById('google-login-btn')?.addEventListener('click', async function() {
            const orig = this.innerHTML;
            this.textContent = 'Connecting...';
            this.disabled = true;

            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    const userId = 'USR-' + Date.now().toString(36).toUpperCase();
                    await db.collection('users').doc(user.uid).set({
                        userId: userId,
                        email: user.email,
                        name: user.displayName || '',
                        photoURL: user.photoURL || '',
                        country: '',
                        currency: 'USD',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        emailVerified: true,
                        onboardingCompleted: false,
                        isSeller: false
                    });
                }

                const data = userDoc.exists ? userDoc.data() : {};
                sessionStorage.setItem('userData', JSON.stringify(data));

                showAlert('✅ Signed in!', 'success');
                setTimeout(() => {
                    window.location.href = data.onboardingCompleted ? 'home.html' : 'wizard.html';
                }, 800);

            } catch(error) {
                console.error('Google login error:', error);
                showAlert('Google sign-in failed. Try again.', 'error');
                this.innerHTML = orig;
                this.disabled = false;
            }
        });

        // =====================
        // RESEND VERIFICATION
        // =====================
        document.getElementById('resend-verification')?.addEventListener('click', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            
            if (!email) {
                showAlert('Enter your email first', 'error');
                return;
            }

            try {
                const methods = await auth.fetchSignInMethodsForEmail(email);
                if (methods.length === 0) {
                    showAlert('No account found with this email', 'error');
                    return;
                }

                // Try signing in and resending
                const password = prompt('Enter your password to resend verification:');
                if (!password) return;

                const userCred = await auth.signInWithEmailAndPassword(email, password);
                await userCred.user.sendEmailVerification();
                await auth.signOut();
                
                showAlert('✅ Verification email sent! Check your inbox.', 'success');
            } catch(error) {
                showAlert('Failed to resend. Try forgot password instead.', 'error');
            }
        });

        // =====================
        // ALERT HELPER
        // =====================
        function showAlert(msg, type) {
            const container = document.getElementById('alert-container');
            if (!container) return;
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = msg;
            container.innerHTML = '';
            container.appendChild(alert);
            alert.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        console.log('✅ Login page ready');
    })();
    </script>
</body>
</html>
