<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6C3CF0">
    <title>Store Setup - Stoliy</title>
    <link rel="icon" type="image/png" href="app-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #F7F7F9; --card: #FFFFFF; --text: #1A1A2E; --text2: #6B7280; --text3: #9CA3AF; --accent: #6C3CF0; --success: #2ECC71; --error: #FF4D4F; --warning: #F4B400; --border: #E5E7EB; --radius: 16px; --font: 'Inter', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); }
        .wizard-container { max-width: 550px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px; }
        .wizard-header { padding: 20px 16px 16px; background: #fff; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        .wizard-logo { width: 44px; height: 44px; border-radius: 12px; margin-bottom: 8px; }
        .wizard-title { font-size: 20px; font-weight: 800; }
        .wizard-subtitle { font-size: 13px; color: var(--text2); }
        .currency-badge { display: inline-block; background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-left: 4px; }
        .progress-bar { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 14px; }
        .progress-dot { width: 22px; height: 22px; border-radius: 50%; background: #E5E7EB; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; color: var(--text3); transition: all 0.3s; flex-shrink: 0; }
        .progress-dot.active { background: var(--accent); color: #fff; box-shadow: 0 0 0 5px rgba(108,60,240,0.15); }
        .progress-dot.done { background: var(--success); color: #fff; }
        .progress-line { width: 20px; height: 2px; background: #E5E7EB; }
        .progress-line.done { background: var(--success); }
        .step-content { padding: 20px 16px; }
        .step-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .step-desc { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
        .plan-cards { display: flex; flex-direction: column; gap: 12px; }
        .plan-card { background: #fff; border: 2px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; }
        .plan-card.selected { border-color: var(--accent); background: rgba(108,60,240,0.02); }
        .plan-badge { position: absolute; top: 12px; right: 12px; background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; }
        .plan-name { font-size: 18px; font-weight: 700; }
        .plan-price { font-size: 26px; font-weight: 800; color: var(--accent); margin: 6px 0; }
        .plan-price span { font-size: 14px; color: var(--text2); font-weight: 400; }
        .plan-features { list-style: none; font-size: 12px; color: var(--text2); }
        .plan-features li { padding: 3px 0; }
        .plan-features li i { color: var(--success); margin-right: 6px; font-size: 10px; }
        .form-group { margin-bottom: 14px; }
        .form-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
        .form-input { width: 100%; padding: 13px 15px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; font-family: var(--font); background: #fff; color: var(--text); }
        .form-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(108,60,240,0.06); }
        .form-input:disabled { background: #F9FAFB; color: var(--text2); }
        textarea.form-input { resize: vertical; min-height: 70px; }
        select.form-input { appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236B7280' stroke-width='1.5'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 14px center; padding-right: 40px; cursor: pointer; background-color: #fff; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .upload-zone { border: 2px dashed #D1D5DB; border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; background: #FAFAFA; }
        .upload-zone img { max-width: 100%; max-height: 100px; border-radius: 8px; margin-top: 8px; }
        .color-row { display: flex; gap: 8px; }
        .color-dot { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .color-dot.selected { border-color: var(--text); }
        .review-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
        .review-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F3F4F6; font-size: 13px; }
        .review-label { color: var(--text2); }
        .review-value { font-weight: 600; }
        .payment-card { background: #fff; border: 2px solid var(--border); border-radius: var(--radius); padding: 20px; }
        .payment-card.selected { border-color: var(--accent); }
        .success-icon { width: 80px; height: 80px; border-radius: 50%; background: rgba(46,204,113,0.1); display: flex; align-items: center; justify-content: center; margin: 40px auto 20px; font-size: 40px; }
        .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 550px; background: #fff; padding: 14px 16px 30px; border-top: 1px solid var(--border); display: flex; gap: 10px; z-index: 100; }
        .btn { padding: 14px 20px; border-radius: 14px; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s; font-family: var(--font); text-align: center; border: none; }
        .btn-primary { background: var(--accent); color: #fff; flex: 1; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.4; }
        .btn-secondary { background: #F3F4F6; color: var(--text); }
        .btn-success { background: var(--success); color: #fff; flex: 1; }
        .rate-info { background: rgba(108,60,240,0.05); border: 1px solid rgba(108,60,240,0.1); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; font-size: 12px; color: var(--text2); text-align: center; }
        .no-country-warning { background: rgba(244,180,0,0.1); border: 1px solid rgba(244,180,0,0.2); border-radius: 12px; padding: 16px; text-align: center; }
        .no-country-warning i { font-size: 32px; color: var(--warning); display: block; margin-bottom: 8px; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1A1A2E; color: #fff; padding: 14px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.3); transition: transform 0.3s ease; max-width: 90%; text-align: center; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: #2ECC71; }
        .toast.error { background: #FF4D4F; }
        .toast.warning { background: #F4B400; color: #1A1A2E; }
        .loading-wrap { display: flex; justify-content: center; padding: 60px; }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="wizard-container">
        <div class="wizard-header">
            <img src="app-icon.png" alt="Stoliy" class="wizard-logo" onerror="this.style.display='none'">
            <div class="wizard-title">Store Setup <span class="currency-badge" id="currencyBadge">USD</span></div>
            <div class="wizard-subtitle" id="wizardSubtitle">Create your online store</div>
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="step-content" id="stepContent"><div class="loading-wrap"><div class="spinner"></div></div></div>
        <div class="bottom-bar">
            <button class="btn btn-secondary" id="btnBack" onclick="prevStep()" style="display:none;">Back</button>
            <button class="btn btn-primary" id="btnNext" onclick="nextStep()">Continue</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <script src="countries.js"></script>

    <script>
    (function() {
        console.log('🧙 Wizard Starting...');
        try { if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebaseConfig); } catch(e) {}
        var auth = firebase.auth(), db = firebase.firestore();
        var currentUser, userData, currentStep=1, totalSteps=10, countryList=[], exchangeRates={}, userCurrency='USD', userCurrencySymbol='$';
        var wizardData = {
            plan:'', planPrice:0, planStores:1,
            fullName:'', email:'', phone:'', country:'', userCountryCode:'', currency:'USD',
            storeName:'', storeCategory:'', storeDesc:'',
            logo:'', banner:'', themeColor:'#6C3CF0',
            shippingType:'flat', paymentRef:'', storeId:''
        };

        // ============ FLUTTERWAVE ============
        function loadFlutterwave(cb) {
            if (typeof FlutterwaveCheckout !== 'undefined') { if(cb)cb(); return; }
            var s = document.createElement('script');
            s.src = 'https://checkout.flutterwave.com/v3.js';
            s.onload = function() { console.log('✅ FW loaded'); if(cb)cb(); };
            document.head.appendChild(s);
        }
        loadFlutterwave();

        // ============ COUNTRIES ============
        function loadCountries() {
            if (typeof countries !== 'undefined' && Array.isArray(countries) && countries.length) { countryList = countries; return true; }
            if (typeof window.countries !== 'undefined' && Array.isArray(window.countries) && window.countries.length) { countryList = window.countries; return true; }
            if (typeof COUNTRIES !== 'undefined' && Array.isArray(COUNTRIES) && COUNTRIES.length) { countryList = COUNTRIES; return true; }
            return false;
        }
        loadCountries();
        setTimeout(loadCountries, 200); setTimeout(loadCountries, 600); setTimeout(loadCountries, 1500);

        function getCurrencyForCountry(code) { var c = countryList.find(function(x){return (x.code||x.iso2||x.alpha2)===code;}); return c ? (c.currency||'USD') : 'USD'; }
        function getCurrencySymbol(code) { var s={USD:'$',NGN:'₦',GHS:'GH₵',KES:'KSh',ZAR:'R',EUR:'€',GBP:'£'}; return s[code]||'$'; }
        function getCountryNameFromCode(code) { var c = countryList.find(function(x){return (x.code||x.iso2||x.alpha2)===code;}); return c ? (c.name||c.country||c.countryName||'') : ''; }
        function getCountryFlag(name) { var c=countryList.find(function(x){return (x.name||x.country)===name;}); return c ? (c.flag||c.emoji||'') : ''; }
        function convertPrice(usd, curr) { if(!curr||curr==='USD'||!usd) return usd; var rate=exchangeRates[curr]||1; return usd*rate; }

        async function fetchRates() {
            try { var r=await fetch('https://api.exchangerate-api.com/v4/latest/USD'); var d=await r.json(); exchangeRates=d.rates; sessionStorage.setItem('exchangeRates',JSON.stringify(d.rates)); } catch(e) { var c=sessionStorage.getItem('exchangeRates'); if(c) exchangeRates=JSON.parse(c); }
        }

        function showToast(msg, type) {
            var t=document.querySelector('.toast'); if(t)t.remove();
            t=document.createElement('div'); t.className='toast '+(type||''); t.textContent=msg; document.body.appendChild(t);
            setTimeout(function(){t.classList.add('show')},10);
            setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove()},300)},2500);
        }

        function buildCountryOptions(sel) {
            if (!countryList || !countryList.length) return '<option value="">Loading...</option>';
            var h = '<option value="">Select country</option>';
            countryList.forEach(function(c) {
                var f = c.flag||c.emoji||c.flagEmoji||'';
                var n = c.name||c.country||c.countryName||'';
                var code = c.code||c.iso2||c.alpha2||'';
                var curr = c.currency||'USD';
                var selected = (sel && n === sel) ? ' selected' : '';
                h += '<option value="'+n+'" data-code="'+code+'" data-currency="'+curr+'"'+selected+'>'+f+' '+n+'</option>';
            });
            return h;
        }

        function updateProgress() {
            var dots='';
            for(var i=1;i<=totalSteps;i++) {
                var cls=i<currentStep?'done':i===currentStep?'active':'';
                var txt=i<currentStep?'✓':i;
                dots+='<div class="progress-dot '+cls+'">'+txt+'</div>';
                if(i<totalSteps) dots+='<div class="progress-line '+(i<currentStep?'done':'')+'"></div>';
            }
            document.getElementById('progressBar').innerHTML=dots;
            document.getElementById('btnBack').style.display=currentStep>1&&currentStep<10?'inline-block':'none';
            document.getElementById('btnNext').style.display=currentStep===10?'none':'inline-block';
        }

        function renderStep() {
            updateProgress();
            document.getElementById('currencyBadge').textContent = userCurrency;
            var c=document.getElementById('stepContent'), h='';
            var sym=userCurrencySymbol, rate=exchangeRates[userCurrency]||1;
            var userCountryName = getCountryNameFromCode(wizardData.userCountryCode);

            if (currentStep === 1) {
                // Check if user has country set
                if (!wizardData.userCountryCode) {
                    h = '<div class="no-country-warning"><i class="fas fa-globe"></i><h3 style="margin-bottom:8px;">Set Your Country First</h3><p style="font-size:13px;color:var(--text2);margin-bottom:16px;">Please set your country in profile to see prices in your local currency.</p><button class="btn btn-primary" onclick="window.location.href=\'profile.html\'">Go to Profile Settings</button></div>';
                } else {
                    h = '<div class="step-title">Choose a Plan</div>';
                    h += '<div class="step-desc">Prices shown in <strong>'+userCurrency+'</strong> based on your country: '+getCountryFlag(userCountryName)+' '+userCountryName+'</div>';
                    if(userCurrency!=='USD'&&rate>0) h += '<div class="rate-info">1 USD = '+rate.toFixed(2)+' '+userCurrency+' • All prices in '+userCurrency+'</div>';
                    h += '<div class="plan-cards">';
                    [{name:'Basic',price:5,stores:1,features:['25 Products','Basic Analytics','Email Support']},
                     {name:'Pro',price:15,stores:5,features:['Unlimited Products','Premium Themes','Priority Support','Marketing Tools'],popular:true},
                     {name:'Enterprise',price:45,stores:999,features:['Unlimited Everything','Team Members','API Access','Custom Branding']}].forEach(function(p){
                        var cp=convertPrice(p.price,userCurrency);
                        h+='<div class="plan-card'+(wizardData.plan===p.name?' selected':'')+'" onclick="selectPlan(\''+p.name+'\','+p.price+','+p.stores+')">'+(p.popular?'<span class="plan-badge">⭐ Most Popular</span>':'')+'<div class="plan-name">'+p.name+'</div><div class="plan-price">'+sym+cp.toFixed(2)+'<span>/month</span></div><ul class="plan-features">'+p.features.map(function(f){return '<li><i class="fas fa-check-circle"></i> '+f+'</li>';}).join('')+'</ul></div>';
                    });
                    h+='</div>';
                }
            } else if (currentStep === 2) {
                h='<div class="step-title">Account Information</div><div class="step-desc">Your seller details</div>';
                h+='<div class="form-group"><label class="form-label">Full Name *</label><input type="text" class="form-input" id="fldName" value="'+wizardData.fullName+'"></div>';
                h+='<div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" value="'+wizardData.email+'" disabled style="background:#F9FAFB;"></div>';
                h+='<div class="form-group"><label class="form-label">Phone *</label><input type="tel" class="form-input" id="fldPhone" value="'+wizardData.phone+'"></div>';
                h+='<div class="form-group"><label class="form-label">Country *</label><select class="form-input" id="fldCountry" onchange="onCountryChange()">'+buildCountryOptions(wizardData.country||userCountryName)+'</select></div>';
            } else if (currentStep === 3) {
                h='<div class="step-title">Store Details</div><div class="step-desc">Tell us about your store</div>';
                h+='<div class="form-group"><label class="form-label">Store Name *</label><input type="text" class="form-input" id="fldStoreName" value="'+wizardData.storeName+'"></div>';
                h+='<div class="form-group"><label class="form-label">Category *</label><select class="form-input" id="fldStoreCat">'+((CONFIG.storeCategories||[{name:'Fashion'},{name:'Electronics'}]).map(function(x){return '<option value="'+x.name+'"'+(wizardData.storeCategory===x.name?' selected':'')+'>'+x.name+'</option>';}).join(''))+'</select></div>';
                h+='<div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="fldStoreDesc">'+wizardData.storeDesc+'</textarea></div>';
            } else if (currentStep === 4) {
                h='<div class="step-title">Store Branding</div><div class="step-desc">Customize your store</div>';
                h+='<div class="form-group"><label class="form-label">Logo</label><div class="upload-zone" onclick="document.getElementById(\'logoInput\').click()"><i class="fas fa-camera"></i><p style="font-size:12px;">Upload Logo</p>'+(wizardData.logo?'<img src="'+wizardData.logo+'">':'')+'<input type="file" id="logoInput" accept="image/*" style="display:none;" onchange="handleUpload(\'logo\',this)"></div></div>';
                h+='<div class="form-group"><label class="form-label">Banner</label><div class="upload-zone" onclick="document.getElementById(\'bannerInput\').click()"><i class="fas fa-image"></i><p style="font-size:12px;">Upload Banner</p>'+(wizardData.banner?'<img src="'+wizardData.banner+'">':'')+'<input type="file" id="bannerInput" accept="image/*" style="display:none;" onchange="handleUpload(\'banner\',this)"></div></div>';
                h+='<div class="form-group"><label class="form-label">Theme Color</label><div class="color-row">'+['#6C3CF0','#3B82F6','#2ECC71','#F4B400','#FF4D4F','#1A1A2E'].map(function(cl){return '<div class="color-dot'+(wizardData.themeColor===cl?' selected':'')+'" style="background:'+cl+';" onclick="selectColor(\''+cl+'\')"></div>';}).join('')+'</div></div>';
            } else if (currentStep === 5) {
                h='<div class="step-title">Payment Method</div><div class="step-desc">Flutterwave connected for secure payments</div><div class="payment-card selected"><div style="display:flex;align-items:center;gap:12px;"><i class="fas fa-credit-card" style="font-size:24px;color:var(--accent);"></i><div><div style="font-weight:700;">Flutterwave</div><div style="font-size:12px;color:var(--text2);">Cards • Bank Transfer • USSD • Mobile Money</div></div></div></div>';
            } else if (currentStep === 6) {
                var cp=convertPrice(wizardData.planPrice,userCurrency);
                h='<div class="step-title">Plan Review</div><div class="review-card"><div class="review-row"><span class="review-label">Plan</span><span class="review-value">'+wizardData.plan+'</span></div><div class="review-row"><span class="review-label">Price</span><span class="review-value">'+sym+cp.toFixed(2)+'/month</span></div><div class="review-row"><span class="review-label">Stores</span><span class="review-value">'+wizardData.planStores+'</span></div><div class="review-row"><span class="review-label">Store Name</span><span class="review-value">'+wizardData.storeName+'</span></div><div class="review-row"><span class="review-label">Country</span><span class="review-value">'+getCountryFlag(wizardData.country)+' '+wizardData.country+'</span></div><div class="review-row" style="border-top:2px solid var(--border);padding-top:10px;margin-top:6px;"><span class="review-label">Total</span><span class="review-value" style="color:var(--accent);font-size:16px;">'+sym+cp.toFixed(2)+'/month</span></div></div>';
            } else if (currentStep === 7) {
                var cp2=convertPrice(wizardData.planPrice,userCurrency);
                h='<div class="step-title">Secure Payment</div><div class="step-desc">Pay '+sym+cp2.toFixed(2)+' in '+userCurrency+'</div>';
                h+='<div class="review-card" style="margin-bottom:12px;"><div class="review-row"><span>Plan</span><span>'+wizardData.plan+'</span></div><div class="review-row"><span>Amount</span><span style="font-weight:800;color:var(--accent);">'+sym+cp2.toFixed(2)+'</span></div></div>';
                if(userCurrency!=='USD') h+='<div class="rate-info">Exchange rate: 1 USD = '+rate.toFixed(2)+' '+userCurrency+'</div>';
                h+='<button class="btn btn-success" style="width:100%;padding:16px;" onclick="payNow()"><i class="fas fa-lock"></i> Pay '+sym+cp2.toFixed(2)+'</button>';
            } else if (currentStep === 8) {
                h='<div style="text-align:center;padding:40px 0;"><div class="success-icon">✅</div><div class="step-title" style="text-align:center;">Payment Successful!</div><div class="review-card" style="margin-top:16px;"><div class="review-row"><span>Reference</span><span>'+wizardData.paymentRef+'</span></div><div class="review-row"><span>Plan</span><span>'+wizardData.plan+'</span></div></div></div>';
            } else if (currentStep === 9) {
                h='<div class="step-title">Store Configuration</div><div class="step-desc">Final settings</div>';
                h+='<div class="form-group"><label class="form-label">Store Currency</label><select class="form-input" id="fldCurrency"><option value="USD">USD</option><option value="NGN">NGN</option><option value="GHS">GHS</option><option value="KES">KES</option><option value="ZAR">ZAR</option></select></div>';
                h+='<div class="form-group"><label class="form-label">Shipping</label><select class="form-input" id="fldShipping"><option value="flat">Flat Rate</option><option value="free">Free Shipping</option></select></div>';
            } else if (currentStep === 10) {
                var storeUrl = (wizardData.storeName||'mystore').toLowerCase().replace(/\s+/g,'-');
                h='<div style="text-align:center;padding:40px 0;"><div class="success-icon">🎉</div><div class="step-title" style="text-align:center;">Store Ready!</div><div class="review-card" style="margin-top:16px;"><div class="review-row"><span>Store URL</span><span style="color:var(--accent);">stoliy.com/store/'+storeUrl+'</span></div></div><button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="window.location.href=\'store-dashboard.html\'">Go to Dashboard</button></div>';
            }
            c.innerHTML = h;
        }

        window.selectPlan = function(n, p, s) { wizardData.plan=n; wizardData.planPrice=p; wizardData.planStores=s; renderStep(); };
        window.selectColor = function(cl) { wizardData.themeColor=cl; renderStep(); };
        window.handleUpload = function(type, input) {
            if(!input.files||!input.files[0]) return;
            var reader=new FileReader();
            reader.onload=function(e){ wizardData[type]=e.target.result; renderStep(); };
            reader.readAsDataURL(input.files[0]);
        };
        window.onCountryChange = function() {
            var sel=document.getElementById('fldCountry');
            if(!sel) return;
            var opt=sel.options[sel.selectedIndex];
            if(!opt||!opt.value) return;
            var curr=opt.getAttribute('data-currency')||'USD';
            if(curr!==userCurrency){ userCurrency=curr; userCurrencySymbol=getCurrencySymbol(curr); }
            wizardData.country=opt.value;
        };

        function saveStepData() {
            if(currentStep===2){ wizardData.fullName=document.getElementById('fldName')?.value||''; wizardData.phone=document.getElementById('fldPhone')?.value||''; wizardData.country=document.getElementById('fldCountry')?.value||''; }
            if(currentStep===3){ wizardData.storeName=document.getElementById('fldStoreName')?.value||''; wizardData.storeCategory=document.getElementById('fldStoreCat')?.value||''; wizardData.storeDesc=document.getElementById('fldStoreDesc')?.value||''; }
            if(currentStep===9){ wizardData.currency=document.getElementById('fldCurrency')?.value||'USD'; wizardData.shippingType=document.getElementById('fldShipping')?.value||'flat'; }
        }

        function validateStep() {
            if(currentStep===1&&!wizardData.userCountryCode){showToast('Set your country in profile first','warning');return false;}
            if(currentStep===1&&!wizardData.plan){showToast('Select a plan','warning');return false;}
            if(currentStep===2){if(!document.getElementById('fldName')?.value){showToast('Enter name','warning');return false;}if(!document.getElementById('fldPhone')?.value){showToast('Enter phone','warning');return false;}if(!document.getElementById('fldCountry')?.value){showToast('Select country','warning');return false;}}
            if(currentStep===3&&!document.getElementById('fldStoreName')?.value){showToast('Enter store name','warning');return false;}
            return true;
        }

        window.nextStep = function() {
            saveStepData();
            if(!validateStep()) return;
            if(currentStep===7){ payNow(); return; }
            if(currentStep<totalSteps){ currentStep++; renderStep(); }
        };
        window.prevStep = function() { if(currentStep>1){ saveStepData(); currentStep--; renderStep(); } };

        window.payNow = function() {
            if(typeof FlutterwaveCheckout==='undefined'){
                showToast('Loading payment...','warning');
                loadFlutterwave(function(){ showToast('Ready! Click Pay again','success'); });
                return;
            }
            var amount=Math.round(convertPrice(wizardData.planPrice,userCurrency)*100)/100;
            var txRef='STL-SUB-'+Date.now();
            console.log('💳 Paying:',{amount:amount,currency:userCurrency});
            FlutterwaveCheckout({
                public_key: CONFIG.flutterwaveKey,
                tx_ref: txRef,
                amount: amount,
                currency: userCurrency,
                payment_options: 'card,banktransfer,ussd',
                customer: { email: wizardData.email||currentUser?.email, name: wizardData.fullName, phonenumber: wizardData.phone },
                customizations: { title: 'STOLIY', description: wizardData.plan+' Plan', logo: 'app-icon.png' },
                callback: async function(r) {
                    if(r.status==='successful'||r.status==='completed'){
                        wizardData.paymentRef=r.transaction_id||txRef;
                        var storeId='STR-'+Date.now().toString(36).toUpperCase();
                        wizardData.storeId=storeId;
                        await db.collection('stores').doc(storeId).set({
                            storeId:storeId,name:wizardData.storeName,category:wizardData.storeCategory,
                            description:wizardData.storeDesc,logo:wizardData.logo,banner:wizardData.banner,
                            themeColor:wizardData.themeColor,ownerId:currentUser.uid,ownerName:wizardData.fullName,
                            phone:wizardData.phone,country:wizardData.country,currency:wizardData.currency||userCurrency,
                            plan:wizardData.plan,planPrice:wizardData.planPrice,shippingType:wizardData.shippingType,
                            verified:false,active:true,followers:0,rating:0,totalReviews:0,totalProducts:0,
                            subscriptionActive:true,paymentRef:wizardData.paymentRef,
                            createdAt:firebase.firestore.FieldValue.serverTimestamp()
                        });
                        await db.collection('users').doc(currentUser.uid).update({isSeller:true,storeId:storeId,plan:wizardData.plan,onboardingCompleted:true});
                        showToast('Payment successful!','success');
                        currentStep=8; renderStep();
                    }else{showToast('Payment failed','error');}
                },
                onclose:function(){showToast('Payment cancelled','warning');}
            });
        };

        auth.onAuthStateChanged(async function(user) {
            if(!user){window.location.href='login.html';return;}
            currentUser=user;
            var uDoc=await db.collection('users').doc(user.uid).get();
            userData=uDoc.exists?uDoc.data():{};
            wizardData.fullName=userData.name||user.displayName||'';
            wizardData.email=userData.email||'';
            wizardData.phone=userData.phone||'';
            
            // Get user's country from profile
            if(userData.country) {
                wizardData.userCountryCode = userData.country;
                userCurrency = getCurrencyForCountry(userData.country);
                userCurrencySymbol = getCurrencySymbol(userCurrency);
                wizardData.country = getCountryNameFromCode(userData.country);
                wizardData.currency = userCurrency;
                console.log('🌍 User country:', userData.country, 'Currency:', userCurrency);
            } else {
                console.warn('⚠️ User has no country set');
            }
            
            await fetchRates();
            document.getElementById('currencyBadge').textContent = userCurrency;
            if (!wizardData.userCountryCode) {
                document.getElementById('wizardSubtitle').textContent = 'Set your country in profile first';
            }
            renderStep();
        });
    })();
    </script>
</body>
</html>
