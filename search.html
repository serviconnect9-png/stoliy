<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B0B14">
    <title>Search - Stoliy</title>
    <link rel="icon" type="image/png" href="app-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-primary: #0B0B14; --bg-card: #151521; --bg-input: #222236;
            --text-primary: #FFFFFF; --text-secondary: #A0A0B8; --text-muted: #6B7280;
            --accent: #6C3CF0; --success: #2ECC71; --error: #FF4D4F; --border: #2A2A40;
            --radius: 12px; --radius-lg: 16px; --font: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font); background: var(--bg-primary); color: var(--text-primary); }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; }
        
        .search-header { padding: 12px 16px; display: flex; gap: 10px; align-items: center; background: var(--bg-primary); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .search-back { width: 36px; height: 36px; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .search-input-wrap { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; }
        .search-input-wrap i { color: var(--text-muted); font-size: 14px; }
        .search-input-wrap input { flex: 1; background: none; border: none; color: #fff; font-size: 14px; outline: none; font-family: var(--font); }
        .search-input-wrap input::placeholder { color: var(--text-muted); }
        
        .filter-scroll { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-chip { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; transition: all 0.2s; }
        .filter-chip.active { border-color: var(--accent); color: #fff; background: rgba(108,60,240,0.12); }
        
        .results-section { padding: 0 16px 80px; }
        .section-label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .stores-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 16px; scroll-snap-type: x mandatory; margin-bottom: 16px; }
        .stores-scroll::-webkit-scrollbar { display: none; }
        .store-card-sm { flex-shrink: 0; width: 140px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; text-align: center; cursor: pointer; scroll-snap-align: start; transition: all 0.2s; }
        .store-card-sm:hover { border-color: #3A3A55; }
        .store-card-sm img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; }
        .store-card-sm .name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
        .store-card-sm .meta { font-size: 11px; color: var(--text-muted); }
        
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .product-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: all 0.2s; }
        .product-card:hover { border-color: #3A3A55; transform: translateY(-2px); }
        .product-card img { width: 100%; height: 150px; object-fit: cover; }
        .product-card .body { padding: 10px 12px; }
        .product-card .name { font-weight: 600; font-size: 12px; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-card .price { font-weight: 700; font-size: 15px; color: var(--success); }
        .product-card .original { font-size: 11px; color: var(--text-muted); text-decoration: line-through; margin-left: 4px; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
        .empty-state i { font-size: 48px; opacity: 0.4; margin-bottom: 12px; display: block; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(11,11,20,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 6px 0 22px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: var(--text-muted); border: none; background: none; font-family: var(--font); padding: 5px 12px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="search-header">
            <button class="search-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
            <div class="search-input-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search products, stores..." oninput="performSearch()" autofocus>
            </div>
        </div>
        
        <div class="filter-scroll" id="filterScroll">
            <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
            <button class="filter-chip" onclick="setFilter('products',this)">Products</button>
            <button class="filter-chip" onclick="setFilter('stores',this)">Stores</button>
            <button class="filter-chip" onclick="setFilter('verified',this)"><i class="fas fa-check-circle"></i> Verified</button>
        </div>
        
        <div class="results-section" id="resultsContainer">
            <div class="empty-state">
                <i class="fas fa-search"></i>
                <p>Search for products and stores</p>
            </div>
        </div>
        
        <nav class="bottom-nav">
            <button class="nav-item" onclick="window.location.href='home.html'"><i class="fas fa-home"></i><span>Home</span></button>
            <button class="nav-item active"><i class="fas fa-search"></i><span>Search</span></button>
            <button class="nav-item" onclick="window.location.href='cart.html'"><i class="fas fa-shopping-bag"></i><span>Cart</span></button>
            <button class="nav-item" onclick="window.location.href='orders.html'"><i class="fas fa-box-open"></i><span>Orders</span></button>
            <button class="nav-item" onclick="window.location.href='profile.html'"><i class="fas fa-user-circle"></i><span>Profile</span></button>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <script>
        try { if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebaseConfig); } catch(e) {}
        const db = firebase.firestore();
        let allStores = [], allProducts = [], currentFilter = 'all';

        firebase.auth().onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            const [storeSnap, prodSnap] = await Promise.all([
                db.collection('stores').get(),
                db.collection('products').where('active','==',true).get()
            ]);
            allStores = storeSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(s => s.active !== false);
            allProducts = prodSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const params = new URLSearchParams(window.location.search);
            const cat = params.get('category');
            if (cat) { document.getElementById('searchInput').value = cat; performSearch(); }
        });

        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            performSearch();
        }

        function performSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const container = document.getElementById('resultsContainer');
            
            let storeResults = [], productResults = [];
            
            if (q) {
                storeResults = allStores.filter(s => s.name?.toLowerCase().includes(q) || s.description?.toLowerCase().includes(q) || s.category?.toLowerCase().includes(q));
                productResults = allProducts.filter(p => p.name?.toLowerCase().includes(q) || p.description?.toLowerCase().includes(q) || p.category?.toLowerCase().includes(q) || (p.tags||[]).some(t => t.toLowerCase().includes(q)));
            } else {
                storeResults = allStores.slice(0, 10);
                productResults = allProducts.slice(0, 10);
            }

            if (currentFilter === 'verified') storeResults = storeResults.filter(s => s.verified);
            if (currentFilter === 'products') storeResults = [];

            let html = '';
            
            if (currentFilter !== 'products' && storeResults.length > 0) {
                html += `<div class="section-label">Stores (${storeResults.length})</div><div class="stores-scroll">${storeResults.slice(0,15).map(s => `
                    <div class="store-card-sm" onclick="window.location.href='store.html?id=${s.id}'">
                        <img src="${s.logo||'https://via.placeholder.com/48'}" onerror="this.src='https://via.placeholder.com/48'" loading="lazy">
                        <div class="name">${(s.name||'Store').substring(0,16)} ${s.verified?'<i class="fas fa-check-circle" style="color:#6C3CF0;font-size:10px;"></i>':''}</div>
                        <div class="meta">${s.followers||0} followers • ${s.totalProducts||0} products</div>
                    </div>`).join('')}</div>`;
            }

            if (currentFilter !== 'stores' && productResults.length > 0) {
                html += `<div class="section-label">Products (${productResults.length})</div><div class="products-grid">${productResults.slice(0,20).map(p => {
                    const price = p.price||0, orig = p.originalPrice||0, disc = orig>price?Math.round((1-price/orig)*100):0;
                    return `<div class="product-card" onclick="window.location.href='products.html?id=${p.id}'">
                        <img src="${(p.images&&p.images[0])||'https://via.placeholder.com/200'}" onerror="this.src='https://via.placeholder.com/200'" loading="lazy">
                        <div class="body"><div class="name">${p.name||'Product'}</div><span class="price">$${price.toFixed(2)}</span>${disc>0?`<span class="original">$${orig.toFixed(2)}</span>`:''}</div>
                    </div>`}).join('')}</div>`;
            }

            if (!html) html = '<div class="empty-state"><i class="fas fa-search"></i><p>No results found</p><p style="font-size:12px;">Try different keywords</p></div>';
            container.innerHTML = html;
        }

        window.setFilter = setFilter;
        window.performSearch = performSearch;
    </script>
</body>
</html>
