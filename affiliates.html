<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B0B14">
    <title>Affiliates - Stoliy</title>
    <link rel="icon" type="image/png" href="app-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0B0B14; --card: #151521; --text: #FFFFFF; --text2: #A0A0B8; --text3: #6B7280; --accent: #6C3CF0; --success: #2ECC71; --error: #FF4D4F; --warning: #F4B400; --border: #2A2A40; --radius: 14px; --radius-sm: 10px; --font: 'Inter', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        button, select { font-family: var(--font); outline: none !important; -webkit-tap-highlight-color: transparent; }
        button:focus, select:focus { outline: none !important; box-shadow: none !important; }
        button:active { transform: scale(0.96); }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
        
        .page-header { padding: 14px 16px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
        .btn-back { width: 36px; height: 36px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 15px; }
        .page-title { font-size: 17px; font-weight: 700; flex: 1; }
        
        .tabs { display: flex; gap: 4px; padding: 10px 14px; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 11px; font-weight: 500; white-space: nowrap; font-family: var(--font); }
        .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        
        .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; padding: 12px 14px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px; text-align: center; }
        .stat-value { font-size: 20px; font-weight: 800; }
        .stat-label { font-size: 8px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        
        .section { padding: 0 14px; margin-bottom: 14px; }
        .section-title { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; display: flex; gap: 12px; align-items: center; }
        .product-card:hover { border-color: #3A3A55; }
        .product-card img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: var(--bg); }
        .product-info { flex: 1; min-width: 0; }
        .product-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
        .product-store { font-size: 10px; color: var(--text3); }
        .product-price { font-weight: 700; font-size: 14px; color: var(--success); }
        .commission-badge { display: inline-block; background: rgba(108,60,240,0.15); color: var(--accent); padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; margin-top: 4px; }
        
        .affiliate-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
        .affiliate-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .affiliate-product { font-weight: 600; font-size: 13px; }
        .affiliate-status { padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; }
        .status-active { background: rgba(46,204,113,0.15); color: var(--success); }
        .status-pending { background: rgba(244,180,0,0.15); color: var(--warning); }
        .status-rejected { background: rgba(255,77,79,0.15); color: var(--error); }
        .affiliate-link-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
        .affiliate-link { flex: 1; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 10px; color: var(--text2); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-copy { padding: 8px 14px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 11px; cursor: pointer; white-space: nowrap; }
        .affiliate-stats-row { display: flex; gap: 16px; margin-top: 8px; font-size: 10px; color: var(--text3); }
        .affiliate-stats-row span { display: flex; align-items: center; gap: 3px; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; display: none; align-items: flex-end; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-sheet { background: var(--card); width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; max-height: 75vh; overflow-y: auto; padding: 24px 20px 40px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; text-align: center; }
        
        .share-options { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; padding: 10px 0; }
        .share-option { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; padding: 10px; border-radius: 12px; transition: all 0.15s; }
        .share-option:active { background: rgba(255,255,255,0.03); }
        .share-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; }
        .share-option span { font-size: 9px; font-weight: 600; color: var(--text2); }
        .share-icon.whatsapp { background: #25D366; }
        .share-icon.facebook { background: #1877F2; }
        .share-icon.x { background: #000; }
        .share-icon.telegram { background: #0088cc; }
        .share-icon.instagram { background: linear-gradient(135deg,#833AB4,#FD1D1D,#F77737); }
        .share-icon.email { background: #EA4335; }
        .share-icon.copy { background: var(--accent); }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
        .empty-state i { font-size: 48px; opacity: 0.2; margin-bottom: 12px; display: block; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #fff; color: #0B0B14; padding: 12px 22px; border-radius: 25px; font-size: 13px; font-weight: 600; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.5); transition: transform 0.3s ease; max-width: 90%; text-align: center; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: #2ECC71; color: #fff; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 6px 0 22px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: var(--text3); border: none; background: none; font-family: var(--font); padding: 5px 10px; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app-container" id="appRoot">
        <div class="page-header">
            <button class="btn-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
            <h2 class="page-title"><i class="fas fa-users" style="color:var(--accent);margin-right:6px;"></i>Affiliates</h2>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('marketplace',this)">Marketplace</button>
            <button class="tab" onclick="switchTab('myAffiliates',this)">My Affiliates</button>
            <button class="tab" onclick="switchTab('earnings',this)">Earnings</button>
        </div>
        <div id="tabContent"><div style="text-align:center;padding:60px;">Loading...</div></div>
    </div>

    <div class="modal-overlay" id="shareModal">
        <div class="modal-sheet">
            <div class="modal-title">Share Affiliate Link</div>
            <div id="shareContent"></div>
            <button style="width:100%;padding:14px;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:12px;margin-top:12px;cursor:pointer;font-weight:600;" onclick="closeShareModal()">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>

    <script>
    (function() {
        try { if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebaseConfig); } catch(e) {}
        var auth = firebase.auth(), db = firebase.firestore();
        var currentUser, currentTab = 'marketplace';
        var allProducts = [], allStores = [], myAffiliates = [], allOrders = [];

        function showToast(msg, type) {
            var t = document.querySelector('.toast'); if(t) t.remove();
            t = document.createElement('div'); t.className = 'toast ' + (type||''); t.textContent = msg;
            document.body.appendChild(t); setTimeout(function(){ t.classList.add('show'); },10);
            setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); },300); },2000);
        }

        auth.onAuthStateChanged(async function(user) {
            if (!user) { window.location.href = 'login.html'; return; }
            currentUser = user;
            await loadAllData();
        });

        async function loadAllData() {
            var [prodSnap, storeSnap, affSnap, ordSnap] = await Promise.all([
                db.collection('products').get(), db.collection('stores').get(),
                db.collection('affiliates').get(), db.collection('orders').get()
            ]);
            allProducts = prodSnap.docs.map(function(d) { return { id: d.id, ...d.data() }; }).filter(function(p) { return p.affiliateEnabled === true; });
            allStores = storeSnap.docs.map(function(d) { return { id: d.id, ...d.data() }; });
            myAffiliates = affSnap.docs.map(function(d) { return { id: d.id, ...d.data() }; }).filter(function(a) { return a.affiliateId === currentUser.uid; });
            allOrders = ordSnap.docs.map(function(d) { return d.data(); });
            renderTab();
        }

        function renderTab() {
            var container = document.getElementById('tabContent');
            switch(currentTab) {
                case 'marketplace': renderMarketplace(container); break;
                case 'myAffiliates': renderMyAffiliates(container); break;
                case 'earnings': renderEarnings(container); break;
            }
        }

        window.switchTab = function(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            btn.classList.add('active');
            renderTab();
        };

        // ============ MARKETPLACE ============
        function renderMarketplace(container) {
            if (allProducts.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-store-slash"></i><h3>No Affiliate Products</h3><p>No products have affiliate programs enabled yet.</p></div>';
                return;
            }
            container.innerHTML = '<div class="section"><div class="section-title">Available Affiliate Products</div>' + allProducts.map(function(p) {
                var store = allStores.find(function(s) { return s.id === p.storeId; });
                var commission = p.affiliateCommission || 10;
                var isJoined = myAffiliates.some(function(a) { return a.productId === p.id; });
                return '<div class="product-card" onclick="viewProduct(\'' + p.id + '\')">' +
                    '<img src="' + ((p.images&&p.images[0])||'https://via.placeholder.com/60') + '" onerror="this.src=\'https://via.placeholder.com/60\'">' +
                    '<div class="product-info"><div class="product-name">' + (p.name||'Product') + '</div><div class="product-store">' + (store?store.name:'Store') + '</div><div class="product-price">$' + (p.price||0).toFixed(2) + '</div>' +
                    '<span class="commission-badge">' + commission + '% Commission</span>' +
                    (isJoined ? '<div style="font-size:10px;color:var(--success);margin-top:4px;">✓ Joined</div>' : '<button class="btn-copy" style="margin-top:6px;width:100%;" onclick="event.stopPropagation();joinAffiliate(\'' + p.id + '\')">Join Program</button>') +
                    '</div></div>';
            }).join('') + '</div>';
        }

        window.joinAffiliate = async function(productId) {
            if (myAffiliates.some(function(a) { return a.productId === productId; })) { showToast('Already joined!'); return; }
            var product = allProducts.find(function(p) { return p.id === productId; });
            await db.collection('affiliates').add({
                productId: productId, affiliateId: currentUser.uid,
                affiliateName: currentUser.displayName || 'Affiliate',
                affiliateEmail: currentUser.email,
                storeId: product.storeId, commissionRate: product.affiliateCommission || 10,
                status: product.autoApprove ? 'active' : 'pending',
                clicks: 0, sales: 0, earnings: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            myAffiliates.push({ productId: productId, status: product.autoApprove ? 'active' : 'pending' });
            showToast(product.autoApprove ? 'Approved! Start sharing!' : 'Request sent! Awaiting approval.', 'success');
            renderTab();
        };

        // ============ MY AFFILIATES ============
        function renderMyAffiliates(container) {
            var joined = myAffiliates;
            if (joined.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-link"></i><h3>No Affiliate Links</h3><p>Join affiliate programs from the Marketplace tab</p></div>';
                return;
            }
            container.innerHTML = '<div class="section"><div class="section-title">My Affiliate Links</div>' + joined.map(function(a) {
                var product = allProducts.find(function(p) { return p.id === a.productId; });
                var store = allStores.find(function(s) { return s.id === a.storeId; });
                var link = window.location.origin + '/product/' + (product?.slug || (product?.name||'product').toLowerCase().replace(/[^a-z0-9]+/g,'-')) + '?ref=' + currentUser.uid;
                var statusClass = a.status === 'active' ? 'status-active' : a.status === 'pending' ? 'status-pending' : 'status-rejected';
                var mySales = allOrders.filter(function(o) { return o.affiliateId === currentUser.uid && o.items && o.items.some(function(i) { return i.productId === a.productId; }); }).length;
                var myEarnings = allOrders.filter(function(o) { return o.affiliateId === currentUser.uid && o.items && o.items.some(function(i) { return i.productId === a.productId; }); }).reduce(function(s, o) { return s + (o.affiliateCommission || 0); }, 0);
                
                return '<div class="affiliate-card">' +
                    '<div class="affiliate-header"><span class="affiliate-product">' + (product?product.name:'Product') + ' • ' + (store?store.name:'Store') + '</span><span class="affiliate-status ' + statusClass + '">' + a.status + '</span></div>' +
                    '<div style="font-size:11px;color:var(--text3);">Commission: ' + (a.commissionRate||10) + '%</div>' +
                    (a.status === 'active' ? '<div class="affiliate-link-row"><span class="affiliate-link">' + link + '</span><button class="btn-copy" onclick="copyLink(\'' + link + '\')"><i class="fas fa-copy"></i></button><button class="btn-copy" style="background:var(--success);" onclick="openShareModal(\'' + link + '\',\'' + (product?.name||'Product').replace(/'/g,"\\'") + '\')"><i class="fas fa-share-alt"></i></button></div>' : '') +
                    '<div class="affiliate-stats-row"><span><i class="fas fa-mouse-pointer"></i> ' + (a.clicks||0) + ' clicks</span><span><i class="fas fa-shopping-bag"></i> ' + mySales + ' sales</span><span><i class="fas fa-coins"></i> $' + myEarnings.toFixed(2) + ' earned</span></div>' +
                '</div>';
            }).join('') + '</div>';
        }

        // ============ EARNINGS ============
        function renderEarnings(container) {
            var myOrders = allOrders.filter(function(o) { return o.affiliateId === currentUser.uid; });
            var totalEarnings = myOrders.reduce(function(s, o) { return s + (o.affiliateCommission || 0); }, 0);
            var totalSales = myOrders.length;
            
            container.innerHTML = '<div class="stats-row"><div class="stat-card"><div class="stat-value" style="color:var(--success);">$' + totalEarnings.toFixed(2) + '</div><div class="stat-label">Total Earned</div></div><div class="stat-card"><div class="stat-value" style="color:var(--accent);">' + totalSales + '</div><div class="stat-label">Sales</div></div><div class="stat-card"><div class="stat-value" style="color:var(--warning);">' + myAffiliates.filter(function(a){return a.status==='active';}).length + '</div><div class="stat-label">Active Links</div></div></div>' +
                '<div class="section"><div class="section-title">Recent Commissions</div>' +
                (myOrders.length === 0 ? '<div class="empty-state"><i class="fas fa-coins"></i><p>No earnings yet. Share your links!</p></div>' :
                myOrders.slice(0,20).map(function(o) {
                    var item = o.items ? o.items[0] : {};
                    return '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:600;font-size:12px;">' + (item.name||'Product') + '</div><div style="font-size:10px;color:var(--text3);">' + (o.createdAt?.toDate?o.createdAt.toDate().toLocaleDateString():'') + '</div></div><div style="font-weight:800;color:var(--success);">+$' + (o.affiliateCommission||0).toFixed(2) + '</div></div>';
                }).join('')) + '</div>';
        }

        window.copyLink = function(link) { navigator.clipboard.writeText(link).then(function() { showToast('Link copied!','success'); }); };
        
        window.openShareModal = function(link, name) {
            var content = document.getElementById('shareContent');
            var encoded = encodeURIComponent(link);
            var title = encodeURIComponent('Check out ' + name + ' on Stoliy!');
            content.innerHTML = '<div class="share-options">' +
                '<div class="share-option" onclick="shareTo(\'https://wa.me/?text=' + title + '%20' + encoded + '\')"><div class="share-icon whatsapp"><i class="fab fa-whatsapp"></i></div><span>WhatsApp</span></div>' +
                '<div class="share-option" onclick="shareTo(\'https://www.facebook.com/sharer/sharer.php?u=' + encoded + '\')"><div class="share-icon facebook"><i class="fab fa-facebook-f"></i></div><span>Facebook</span></div>' +
                '<div class="share-option" onclick="shareTo(\'https://x.com/intent/tweet?text=' + title + '&url=' + encoded + '\')"><div class="share-icon x"><i class="fab fa-x-twitter"></i></div><span>X</span></div>' +
                '<div class="share-option" onclick="shareTo(\'https://t.me/share/url?url=' + encoded + '&text=' + title + '\')"><div class="share-icon telegram"><i class="fab fa-telegram-plane"></i></div><span>Telegram</span></div>' +
                '<div class="share-option" onclick="shareTo(\'https://www.facebook.com/dialog/send?link=' + encoded + '&app_id=0\')"><div class="share-icon" style="background:#00B2FF;"><i class="fab fa-facebook-messenger"></i></div><span>Messenger</span></div>' +
                '<div class="share-option" onclick="shareTo(\'mailto:?subject=' + title + '&body=' + encoded + '\')"><div class="share-icon email"><i class="fas fa-envelope"></i></div><span>Email</span></div>' +
                '<div class="share-option" onclick="copyLink(\'' + link + '\')"><div class="share-icon instagram"><i class="fab fa-instagram"></i></div><span>Instagram</span></div>' +
                '<div class="share-option" onclick="copyLink(\'' + link + '\')"><div class="share-icon copy"><i class="fas fa-link"></i></div><span>Copy</span></div>' +
                '</div>';
            document.getElementById('shareModal').classList.add('show');
        };

        window.shareTo = function(url) { window.open(url, '_blank'); closeShareModal(); };
        window.closeShareModal = function() { document.getElementById('shareModal').classList.remove('show'); };
        window.viewProduct = function(id) { window.location.href = 'products.html?id=' + id; };

        document.getElementById('shareModal').addEventListener('click', function(e) { if (e.target === this) closeShareModal(); });
    })();
    </script>
</body>
</html>
